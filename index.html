<!DOCTYPE html>
<html lang="sw" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SadeHub — Picha Halisi za Unsplash</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #f8f7f4;
  --bg2:       #eeede9;
  --card:      #ffffff;
  --text:      #111111;
  --text2:     #666;
  --border:    #e2e0da;
  --accent:    #e8304a;
  --nav-bg:    rgba(248,247,244,0.93);
  --input-bg:  #eeede9;
  --tag-bg:    #f0ede8;
  --shadow:    0 2px 16px rgba(0,0,0,0.06);
  --shadow-h:  0 10px 36px rgba(0,0,0,0.13);
  --overlay:   rgba(10,10,10,0.62);
}
[data-theme="dark"] {
  --bg:        #0d0d0d;
  --bg2:       #181818;
  --card:      #1c1c1c;
  --text:      #f0f0f0;
  --text2:     #888;
  --border:    #2a2a2a;
  --accent:    #ff3f57;
  --nav-bg:    rgba(13,13,13,0.96);
  --input-bg:  #222;
  --tag-bg:    #252525;
  --shadow:    0 2px 16px rgba(0,0,0,0.45);
  --shadow-h:  0 10px 36px rgba(0,0,0,0.65);
  --overlay:   rgba(0,0,0,0.72);
}

*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;transition:background .35s,color .35s;min-height:100vh;}

/* NAV */
nav{
  position:fixed;top:0;left:0;right:0;z-index:200;
  height:70px;
  background:var(--nav-bg);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:16px;padding:0 24px;
  transition:background .35s,border-color .35s;
}

/* LOGO */
.logo{
  display:flex;align-items:center;gap:10px;
  text-decoration:none;flex-shrink:0;
}
.logo-icon{
  width:36px;height:36px;border-radius:10px;
  background:linear-gradient(135deg,#e8304a 0%,#ff7a5c 100%);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 12px rgba(232,48,74,.35);
  flex-shrink:0;
}
[data-theme="dark"] .logo-icon{box-shadow:0 4px 14px rgba(255,63,87,.4);}
.logo-icon svg{color:#fff;}
.logo-text{display:flex;flex-direction:column;line-height:1;}
.logo-name{
  font-family:'Syne',serif;font-weight:900;font-size:1.25rem;
  letter-spacing:-1px;
  background:linear-gradient(135deg,#e8304a,#ff7a5c);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.logo-tag{font-size:.6rem;font-weight:500;color:var(--text2);letter-spacing:.5px;text-transform:uppercase;margin-top:1px;}

/* SEARCH */
.search-box{flex:1;max-width:520px;position:relative;}
.search-box svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text2);pointer-events:none;}
#searchInput{
  width:100%;padding:10px 16px 10px 42px;
  border-radius:40px;
  border:2px solid transparent;
  background:var(--input-bg);
  color:var(--text);
  font-family:'Outfit',sans-serif;font-size:.9rem;
  outline:none;
  transition:border-color .2s,background .35s,box-shadow .2s;
}
#searchInput:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(232,48,74,.08);}
#searchInput::placeholder{color:var(--text2);}

/* NAV END */
.nav-end{display:flex;align-items:center;gap:12px;margin-left:auto;flex-shrink:0;}

/* THEME TOGGLE */
.dm-toggle{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;padding:6px 14px;border-radius:40px;border:1.5px solid var(--border);transition:border-color .2s,background .2s;}
.dm-toggle:hover{border-color:var(--accent);}
.dm-label{font-size:.78rem;font-weight:500;color:var(--text2);white-space:nowrap;}
.track{width:40px;height:20px;background:var(--input-bg);border-radius:40px;border:2px solid var(--border);position:relative;transition:background .3s,border-color .3s;cursor:pointer;flex-shrink:0;}
.track::after{content:'';position:absolute;top:2px;left:2px;width:12px;height:12px;border-radius:50%;background:var(--text2);transition:transform .3s,background .3s;}
[data-theme="dark"] .track{background:var(--accent);border-color:var(--accent);}
[data-theme="dark"] .track::after{transform:translateX(20px);background:#fff;}

/* TABS */
.tabs-bar{
  position:fixed;top:70px;left:0;right:0;z-index:190;
  background:var(--bg);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:6px;
  padding:8px 24px;
  overflow-x:auto;scrollbar-width:none;
  transition:background .35s,border-color .35s;
}
.tabs-bar::-webkit-scrollbar{display:none;}
.tab{
  padding:5px 16px;border-radius:40px;
  border:1.5px solid var(--border);
  background:transparent;color:var(--text2);
  font-family:'Outfit',sans-serif;font-size:.8rem;font-weight:500;
  cursor:pointer;white-space:nowrap;transition:all .18s;
}
.tab:hover{border-color:var(--accent);color:var(--accent);}
.tab.active{
  background:linear-gradient(135deg,#e8304a,#ff7a5c);
  border-color:transparent;color:#fff;
  box-shadow:0 3px 10px rgba(232,48,74,.3);
}

/* VIEW SWITCHER */
.view-btn{background:var(--tag-bg);border:none;color:var(--text2);width:32px;height:32px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .18s,color .18s;}
.view-btn.active,.view-btn:hover{background:var(--accent);color:#fff;}

/* MAIN */
main{padding-top:126px;padding-bottom:80px;max-width:1440px;margin:0 auto;padding-left:16px;padding-right:16px;}
.meta-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px;}
.meta-text{font-size:.82rem;color:var(--text2);}
.meta-text strong{color:var(--accent);}
.view-switcher{display:flex;gap:5px;}

/* MASONRY */
.masonry{columns:5;column-gap:12px;}
@media(max-width:1200px){.masonry{columns:4;}}
@media(max-width:900px){.masonry{columns:3;}}
@media(max-width:600px){.masonry{columns:2;}}

/* GRID */
.grid-view{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;}

/* CARD */
.card{break-inside:avoid;margin-bottom:12px;border-radius:16px;overflow:hidden;background:var(--card);box-shadow:var(--shadow);position:relative;cursor:pointer;transition:transform .28s cubic-bezier(.34,1.46,.64,1),box-shadow .28s;animation:popIn .45s ease both;}
.grid-view .card{margin-bottom:0;break-inside:unset;}
.card:hover{transform:translateY(-5px) scale(1.015);box-shadow:var(--shadow-h);}
@keyframes popIn{from{opacity:0;transform:translateY(22px) scale(.97);}to{opacity:1;transform:translateY(0) scale(1);}}

.card-media{position:relative;}
.card img{width:100%;display:block;background:var(--bg2);transition:filter .28s;}
.card:hover img{filter:brightness(.88);}

.card-overlay{position:absolute;inset:0;background:var(--overlay);border-radius:16px;opacity:0;transition:opacity .22s;display:flex;flex-direction:column;justify-content:flex-end;padding:12px;gap:7px;}
.card:hover .card-overlay{opacity:1;}
.overlay-row{display:flex;gap:7px;justify-content:flex-end;}
.ov-btn{padding:6px 14px;border-radius:40px;border:none;font-family:'Outfit',sans-serif;font-size:.76rem;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;transition:transform .18s;}
.ov-btn:hover{transform:scale(1.06);}
.ov-dl{background:var(--accent);color:#fff;}
.ov-open{background:rgba(255,255,255,.18);color:#fff;border:1.5px solid rgba(255,255,255,.35);}

.card-body{padding:9px 11px 11px;background:var(--card);transition:background .35s;}
.card-title{font-size:.8rem;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px;}
.card-sub{font-size:.7rem;color:var(--text2);display:flex;align-items:center;gap:5px;}
.dot{width:4px;height:4px;border-radius:50%;background:var(--text2);flex-shrink:0;}

/* LOADER */
.loader{text-align:center;padding:40px 0;color:var(--text2);font-size:.85rem;}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .75s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* EMPTY */
.empty{text-align:center;padding:80px 20px;color:var(--text2);display:none;}
.empty h3{font-family:'Syne',sans-serif;font-size:1.3rem;margin:12px 0 6px;color:var(--text);}

/* LIGHTBOX */
.lb-wrap{display:none;position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.94);align-items:center;justify-content:center;padding:16px;}
.lb-wrap.open{display:flex;}
.lb-inner{position:relative;max-width:92vw;max-height:90vh;border-radius:16px;overflow:hidden;animation:lbIn .32s cubic-bezier(.34,1.46,.64,1);}
@keyframes lbIn{from{opacity:0;transform:scale(.88);}to{opacity:1;transform:scale(1);}}
.lb-inner img{max-width:90vw;max-height:80vh;object-fit:contain;display:block;}
.lb-bar{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.75));padding:20px 16px 14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.lb-title{color:#fff;font-size:.88rem;font-weight:500;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lb-actions{display:flex;gap:7px;flex-shrink:0;}
.lb-btn{padding:7px 17px;border-radius:40px;border:none;font-family:'Outfit',sans-serif;font-size:.78rem;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;transition:transform .18s;}
.lb-btn:hover{transform:scale(1.05);}
.lb-dl{background:var(--accent);color:#fff;}
.lb-close-btn{background:rgba(255,255,255,.15);color:#fff;border:1.5px solid rgba(255,255,255,.3);}
.lb-top-close{position:absolute;top:12px;right:12px;width:34px;height:34px;border-radius:50%;background:rgba(0,0,0,.55);border:none;color:#fff;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .18s;z-index:10;}
.lb-top-close:hover{background:rgba(230,48,74,.8);}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(14px);background:#111;color:#fff;padding:9px 22px;border-radius:40px;font-size:.82rem;font-weight:500;opacity:0;pointer-events:none;transition:opacity .28s,transform .28s;z-index:500;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* SCROLL TOP */
#scrollTop{position:fixed;bottom:26px;right:22px;z-index:99;width:42px;height:42px;border-radius:50%;background:var(--accent);color:#fff;border:none;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 18px rgba(232,48,74,.4);opacity:0;pointer-events:none;transition:opacity .3s,transform .3s;}
#scrollTop.show{opacity:1;pointer-events:all;}
#scrollTop:hover{transform:translateY(-3px);}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="#" class="logo">
    <div class="logo-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="4"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
    </div>
    <div class="logo-text">
      <span class="logo-name">SadeHub</span>
      <span class="logo-tag">Picha za Unsplash</span>
    </div>
  </a>
  <div class="search-box">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input id="searchInput" type="text" placeholder="Tafuta picha... Tanzania, bahari, chakula..." autocomplete="off">
  </div>
  <div class="nav-end">
    <div class="dm-toggle" onclick="toggleTheme()">
      <span class="dm-label" id="dmLabel">🌙 Giza</span>
      <div class="track"></div>
    </div>
  </div>
</nav>

<!-- TABS -->
<div class="tabs-bar">
  <button class="tab active" data-cat="nature">🌿 Asili</button>
  <button class="tab" data-cat="ocean">🌊 Bahari</button>
  <button class="tab" data-cat="mountain">⛰️ Milima</button>
  <button class="tab" data-cat="flowers">🌸 Maua</button>
  <button class="tab" data-cat="animals">🦁 Wanyama</button>
  <button class="tab" data-cat="city">🏙️ Miji</button>
  <button class="tab" data-cat="food">🍲 Chakula</button>
  <button class="tab" data-cat="art">🎨 Sanaa</button>
  <button class="tab" data-cat="night">🌙 Usiku</button>
  <button class="tab" data-cat="travel">✈️ Safari</button>
  <button class="tab" data-cat="Tanzania">🇹🇿 Tanzania</button>
  <button class="tab" data-cat="Africa">🌍 Afrika</button>
</div>

<!-- MAIN -->
<main>
  <div class="meta-row">
    <div class="meta-text" id="metaText">Inapakia...</div>
    <div class="view-switcher">
      <button class="view-btn active" id="vMasonry" title="Masonry" onclick="setView('masonry')">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="7" height="9" rx="2"/><rect x="14" y="3" width="7" height="5" rx="2"/><rect x="14" y="12" width="7" height="9" rx="2"/><rect x="3" y="16" width="7" height="5" rx="2"/></svg>
      </button>
      <button class="view-btn" id="vGrid" title="Grid" onclick="setView('grid')">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
      </button>
    </div>
  </div>
  <div id="gallery" class="masonry"></div>
  <div class="loader" id="loader" style="display:none">
    <div class="spinner"></div>
    Inapakia zaidi...
  </div>
  <div class="empty" id="emptyMsg">
    <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <h3>Hakuna matokeo</h3>
    <p>Jaribu kutafuta neno tofauti</p>
  </div>
</main>

<!-- LIGHTBOX -->
<div class="lb-wrap" id="lbWrap" onclick="lbBgClick(event)">
  <div class="lb-inner">
    <button class="lb-top-close" onclick="closeLb()">✕</button>
    <img id="lbImg" src="" alt="">
    <div class="lb-bar">
      <span class="lb-title" id="lbTitle"></span>
      <div class="lb-actions">
        <button class="lb-btn lb-dl" id="lbDlBtn">⬇ Pakua</button>
        <button class="lb-btn lb-close-btn" onclick="closeLb()">✕ Funga</button>
      </div>
    </div>
  </div>
</div>

<button id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════
const UNSPLASH_KEY = 'dJSnzG1AcefJPjVymkwRDnr4ySuOXP_IVO8B1O2eG2s';

// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
let currentCat  = 'nature';
let searchQuery = '';
let viewMode    = 'masonry';
let isLoading   = false;
let photoPage   = 1;
let hasMore     = true;
let totalLoaded = 0;
let observer;

// ═══════════════════════════════════════════
//  FETCH — Unsplash API
// ═══════════════════════════════════════════
async function fetchPhotos(query, page) {
  const q = query || 'nature';
  const r = await fetch(
    `https://api.unsplash.com/search/photos?query=${encodeURIComponent(q)}&page=${page}&per_page=20&orientation=portrait`,
    { headers: { 'Authorization': `Client-ID ${UNSPLASH_KEY}` } }
  );
  if (!r.ok) throw new Error('Unsplash hitilafu: ' + r.status);
  const d = await r.json();
  hasMore = page < d.total_pages;
  return (d.results || []).map(p => ({
    id:     p.id,
    title:  p.alt_description || p.description || q,
    author: p.user?.name || '',
    thumb:  p.urls.small,
    url:    p.urls.full,
    color:  p.color || '#ccc',
  }));
}

// ═══════════════════════════════════════════
//  LOAD & RENDER
// ═══════════════════════════════════════════
async function loadMore() {
  if (isLoading || !hasMore) return;
  isLoading = true;
  document.getElementById('loader').style.display = 'block';
  try {
    const q = searchQuery || currentCat || 'nature';
    const photos = await fetchPhotos(q, photoPage);
    photoPage++;
    totalLoaded += photos.length;
    renderItems(photos);
    document.getElementById('metaText').innerHTML =
      `Picha: <strong>${totalLoaded}</strong> zilizopakiwa`;
    if (photos.length === 0 && totalLoaded === 0) {
      document.getElementById('emptyMsg').style.display = 'block';
    }
  } catch(e) {
    console.error(e);
    showToast('❌ Hitilafu ya mtandao — jaribu tena');
  }
  document.getElementById('loader').style.display = 'none';
  isLoading = false;
}

function renderItems(photos) {
  const gallery = document.getElementById('gallery');
  document.getElementById('emptyMsg').style.display = 'none';
  photos.forEach((item, idx) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = (idx * 0.04) + 's';
    card.innerHTML = `
      <div class="card-media">
        <img src="${item.thumb}" alt="${escHtml(item.title)}" loading="lazy" style="background:${item.color}">
        <div class="card-overlay">
          <div class="overlay-row">
            <button class="ov-btn ov-dl"   onclick="downloadPhoto(event,'${item.url}','${escJs(item.title)}')">⬇ Pakua</button>
            <button class="ov-btn ov-open" onclick="openLb(event,'${item.url}','${escJs(item.title)}')">🔍 Ona</button>
          </div>
        </div>
      </div>
      <div class="card-body">
        <div class="card-title">${escHtml(item.title || 'Bila jina')}</div>
        <div class="card-sub">
          <span>📷</span><div class="dot"></div><span>${escHtml(item.author)}</span>
        </div>
      </div>`;
    card.addEventListener('click', e => {
      if (e.target.closest('.ov-btn')) return;
      openLb(e, item.url, item.title);
    });
    gallery.appendChild(card);
  });
  setupObserver();
}

// ═══════════════════════════════════════════
//  INFINITE SCROLL
// ═══════════════════════════════════════════
function setupObserver() {
  if (observer) observer.disconnect();
  const sentinel = document.createElement('div');
  sentinel.id = 'sentinel';
  sentinel.style.height = '1px';
  document.getElementById('gallery').after(sentinel);
  observer = new IntersectionObserver(entries => {
    if (entries[0].isIntersecting) loadMore();
  }, { rootMargin: '300px' });
  observer.observe(sentinel);
}

// ═══════════════════════════════════════════
//  RESET & SEARCH
// ═══════════════════════════════════════════
function resetAndLoad() {
  photoPage = 1; hasMore = true; isLoading = false; totalLoaded = 0;
  document.getElementById('gallery').innerHTML = '';
  document.getElementById('emptyMsg').style.display = 'none';
  const s = document.getElementById('sentinel');
  if (s) s.remove();
  loadMore();
}

let searchTimer;
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    searchQuery = e.target.value.trim();
    currentCat = '';
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    resetAndLoad();
  }, 500);
});

document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentCat = btn.dataset.cat;
    searchQuery = '';
    document.getElementById('searchInput').value = '';
    resetAndLoad();
  });
});

// ═══════════════════════════════════════════
//  VIEW SWITCHER
// ═══════════════════════════════════════════
function setView(mode) {
  document.getElementById('gallery').className = mode === 'grid' ? 'grid-view' : 'masonry';
  document.getElementById('vMasonry').classList.toggle('active', mode === 'masonry');
  document.getElementById('vGrid').classList.toggle('active', mode === 'grid');
}

// ═══════════════════════════════════════════
//  LIGHTBOX
// ═══════════════════════════════════════════
function openLb(e, url, title) {
  e && e.stopPropagation();
  document.getElementById('lbImg').src = url;
  document.getElementById('lbTitle').textContent = title;
  document.getElementById('lbDlBtn').onclick = () => downloadPhoto(null, url, title);
  document.getElementById('lbWrap').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLb() {
  document.getElementById('lbWrap').classList.remove('open');
  document.getElementById('lbImg').src = '';
  document.body.style.overflow = '';
}
function lbBgClick(e) {
  if (e.target === document.getElementById('lbWrap')) closeLb();
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLb(); });

// ═══════════════════════════════════════════
//  DOWNLOAD
// ═══════════════════════════════════════════
async function downloadPhoto(e, url, title) {
  e && e.stopPropagation();
  showToast('⏳ Inapakuliwa...');
  try {
    const r = await fetch(url);
    const blob = await r.blob();
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = (title || 'picha').replace(/\s+/g, '_').substring(0, 40) + '.jpg';
    a.click();
    URL.revokeObjectURL(a.href);
    showToast('✅ Picha imepakuliwa!');
  } catch {
    window.open(url, '_blank');
    showToast('✅ Imefunguliwa kwenye tab mpya');
  }
}

// ═══════════════════════════════════════════
//  THEME
// ═══════════════════════════════════════════
function toggleTheme() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.getElementById('dmLabel').textContent = isDark ? '🌙 Giza' : '☀️ Mwanga';
}

// ═══════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════
let toastTimer;
function showToast(msg) {
  clearTimeout(toastTimer);
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
}

// ═══════════════════════════════════════════
//  SCROLL TOP
// ═══════════════════════════════════════════
window.addEventListener('scroll', () => {
  document.getElementById('scrollTop').classList.toggle('show', scrollY > 500);
});

// ═══════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════
function escHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escJs(s)   { return (s||'').replace(/'/g,"\\'").replace(/"/g,'\\"'); }

loadMore();
</script>
